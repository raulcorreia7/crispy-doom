name: DMCP Release

on:
  push:
    tags:
      - 'dmcp-v*'
  workflow_dispatch:

concurrency:
  group: dmcp-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: crispy-doom-dmcp-linux
            asset_name: crispy-doom-dmcp-linux.tar.gz
          - os: macos-latest
            artifact_name: crispy-doom-dmcp-macos
            asset_name: crispy-doom-dmcp-macos.tar.gz
          - os: windows-latest
            artifact_name: crispy-doom-dmcp-windows
            asset_name: crispy-doom-dmcp-windows.zip

    steps:
      - name: Checkout crispy-doom
        uses: actions/checkout@v4

      - name: Checkout DMCP
        uses: actions/checkout@v4
        with:
          repository: raulcorreia7/doom-mcp
          ref: ba448e4cc6cb3a823d15f1df6e219a6c7bd13d65
          path: dmcp
          submodules: recursive

      - name: Restore DMCP build cache
        uses: actions/cache@v4
        with:
          path: |
            dmcp/.cache
            dmcp/build/vcpkg_installed
          key: dmcp-build-${{ runner.os }}-${{ hashFiles('dmcp/CMakeLists.txt', 'dmcp/cmake/CPM.cmake', 'dmcp/vcpkg.json') }}
          restore-keys: |
            dmcp-build-${{ runner.os }}-

      - name: Restore vcpkg binary cache (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'dmcp/vcpkg.json') }}
          restore-keys: |
            vcpkg-archives-${{ runner.os }}-

      - name: Restore vcpkg downloads cache (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads
          key: vcpkg-downloads-${{ runner.os }}-v1
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libsdl2-dev libsdl2-net-dev libsdl2-mixer-dev \
            libpng-dev libsamplerate0-dev zlib1g-dev

      - name: Install macOS Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install sdl2 sdl2_net sdl2_mixer libpng libsamplerate

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build DMCP (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cmake -S dmcp -B dmcp/build \
            -DDMCP_BUILD_SHARED=ON \
            -DDMCP_BUILD_EXAMPLES=OFF \
            -DDMCP_BUILD_ADAPTER_FAKE=OFF \
            -DDMCP_BUILD_ADAPTER_ZDOOM=OFF \
            -DDMCP_BUILD_ADAPTER_CRISPY=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build dmcp/build --config Release --parallel

      - name: Build DMCP (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cmake -S dmcp -B dmcp/build \
            -DDMCP_BUILD_SHARED=ON \
            -DDMCP_BUILD_EXAMPLES=OFF \
            -DDMCP_BUILD_ADAPTER_FAKE=OFF \
            -DDMCP_BUILD_ADAPTER_ZDOOM=OFF \
            -DDMCP_BUILD_ADAPTER_CRISPY=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-undefined,dynamic_lookup"
          cmake --build dmcp/build --config Release --parallel

      - name: Build DMCP (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          echo {"dependencies":["zlib","libuv"]}> dmcp\vcpkg.json
          cmake -S dmcp -B dmcp/build ^
            -DDMCP_BUILD_SHARED=ON ^
            -DDMCP_BUILD_EXAMPLES=OFF ^
            -DDMCP_BUILD_ADAPTER_FAKE=OFF ^
            -DDMCP_BUILD_ADAPTER_ZDOOM=OFF ^
            -DDMCP_BUILD_ADAPTER_CRISPY=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DCMAKE_PREFIX_PATH="%CD%\dmcp\build\vcpkg_installed\x64-windows"
          cmake --build dmcp/build --config Release --parallel

      - name: Configure with DMCP (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cmake -B build \
            -DDMCP_ENABLE=ON \
            -DDMCP_ROOT="$(pwd)/dmcp" \
            -DDMCP_ADAPTER_DIR="$(pwd)/dmcp/adapters/crispy-doom" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure with DMCP (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          cmake -B build ^
            -DDMCP_ENABLE=ON ^
            -DDMCP_ROOT="%CD%\dmcp" ^
            -DDMCP_ADAPTER_DIR="%CD%\dmcp\adapters\crispy-doom" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DCMAKE_PREFIX_PATH="%VCPKG_INSTALLATION_ROOT%\installed\x64-windows;%CD%\dmcp\build\vcpkg_installed\x64-windows"

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp build/src/crispy-*.exe dist/ 2>/dev/null || cp build/src/Release/crispy-*.exe dist/
          cp dmcp/build/Release/dmcp_core.dll dist/ 2>/dev/null || cp dmcp/build/dmcp_core.dll dist/ 2>/dev/null || true
          cp dmcp/build/vcpkg_installed/x64-windows/bin/*.dll dist/ 2>/dev/null || true
          cp "$VCPKG_INSTALLATION_ROOT"/installed/x64-windows/bin/*.dll dist/ 2>/dev/null || true
          cp dmcp/scripts/go.bat dist/ 2>/dev/null || true
          cp dmcp/scripts/download_wad.bat dist/ 2>/dev/null || true
          7z a "${{ matrix.asset_name }}" ./dist/*

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp build/src/crispy-* dist/
          cp dmcp/build/libdmcp_core.so dist/ 2>/dev/null || true
          cp dmcp/build/libdmcp_core.dylib dist/ 2>/dev/null || true
          cp dmcp/scripts/go.sh dist/ 2>/dev/null || true
          cp dmcp/scripts/download_wad.sh dist/ 2>/dev/null || true
          chmod +x dist/go.sh dist/download_wad.sh 2>/dev/null || true
          tar -czf "${{ matrix.asset_name }}" -C dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            */*.tar.gz
            */*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
